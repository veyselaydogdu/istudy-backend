gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss text/javascript;

# İzin verilen origin'leri map ile kontrol et
map $http_origin $cors_allow_origin {
    default                     "";
    "http://localhost:3000"     "http://localhost:3000";
    "http://localhost:3001"     "http://localhost:3001";
    "http://localhost:3002"     "http://localhost:3002";
    "https://localhost"         "https://localhost";
    "http://localhost"          "http://localhost";
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# Plain HTTP - Yerel geliştirme için (port 8000)
server {
    listen 8000;
    server_name _;

    root  /var/www/html/public;
    index index.php;

    charset utf-8;
    client_max_body_size 50M;

    # CORS - OPTIONS preflight isteklerini Nginx seviyesinde handle et
    location /api/ {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'      $cors_allow_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true'             always;
            add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type, Accept, X-Requested-With, X-XSRF-TOKEN' always;
            add_header 'Access-Control-Max-Age'           '86400'            always;
            add_header 'Content-Length' 0;
            add_header 'Content-Type'   'text/plain';
            return 204;
        }

        try_files $uri $uri/ /index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass            app:9000;
        fastcgi_index           index.php;
        fastcgi_param           SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout    300;
        fastcgi_buffer_size     16k;
        fastcgi_buffers         4 16k;
        include                 fastcgi_params;

        # PHP'nin ürettiği CORS başlıklarını gizle, Nginx yönetsin
        fastcgi_hide_header 'Access-Control-Allow-Origin';
        fastcgi_hide_header 'Access-Control-Allow-Credentials';
        fastcgi_hide_header 'Access-Control-Allow-Methods';
        fastcgi_hide_header 'Access-Control-Allow-Headers';
        fastcgi_hide_header 'Access-Control-Max-Age';

        # Nginx seviyesinde CORS başlıklarını ekle
        add_header 'Access-Control-Allow-Origin'      $cors_allow_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true'             always;

        # Güvenlik başlıkları (location'da add_header olunca üst bloktan inherit edilmez)
        add_header X-Frame-Options        "DENY"                        always;
        add_header X-Content-Type-Options "nosniff"                     always;
        add_header X-XSS-Protection       "1; mode=block"               always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    }

    location ~ /\.ht {
        deny all;
    }
}

# Laravel API - HTTPS
server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/ssl/nginx-selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx-selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root  /var/www/html/public;
    index index.php;

    charset utf-8;
    client_max_body_size 50M;

    # CORS - OPTIONS preflight isteklerini Nginx seviyesinde handle et
    location /api/ {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'      $cors_allow_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true'             always;
            add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type, Accept, X-Requested-With, X-XSRF-TOKEN' always;
            add_header 'Access-Control-Max-Age'           '86400'            always;
            add_header 'Content-Length' 0;
            add_header 'Content-Type'   'text/plain';
            return 204;
        }

        try_files $uri $uri/ /index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass            app:9000;
        fastcgi_index           index.php;
        fastcgi_param           SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout    300;
        fastcgi_buffer_size     16k;
        fastcgi_buffers         4 16k;
        include                 fastcgi_params;

        # PHP'nin ürettiği CORS başlıklarını gizle, Nginx yönetsin
        fastcgi_hide_header 'Access-Control-Allow-Origin';
        fastcgi_hide_header 'Access-Control-Allow-Credentials';
        fastcgi_hide_header 'Access-Control-Allow-Methods';
        fastcgi_hide_header 'Access-Control-Allow-Headers';
        fastcgi_hide_header 'Access-Control-Max-Age';

        # Nginx seviyesinde CORS başlıklarını ekle
        add_header 'Access-Control-Allow-Origin'      $cors_allow_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true'             always;

        # Güvenlik başlıkları
        add_header X-Frame-Options           "DENY"                        always;
        add_header X-Content-Type-Options    "nosniff"                     always;
        add_header X-XSS-Protection          "1; mode=block"               always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    location ~ /\.ht {
        deny all;
    }
}
