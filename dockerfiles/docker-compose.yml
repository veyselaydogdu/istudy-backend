services:
  app:
    build:
      context: ./php
      dockerfile: Dockerfile
    image: istudy-app
    container_name: istudy-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ../:/var/www/html
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: istudy
      DB_USERNAME: istudy
      DB_PASSWORD: password
    networks:
      - istudy-network

  webserver:
    image: nginx:alpine
    container_name: istudy-webserver
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../:/var/www/html
      - ./nginx/conf.d/:/etc/nginx/conf.d/
      - ./ssl/:/etc/nginx/ssl/
    networks:
      - istudy-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: istudy-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: istudy
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: istudy
      MYSQL_PASSWORD: password
    volumes:
      - istudy-db-data:/var/lib/mysql
    networks:
      - istudy-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: istudy-phpmyadmin
    restart: unless-stopped
    links:
      - db
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    networks:
      - istudy-network

networks:
  istudy-network:
    driver: bridge

volumes:
  istudy-db-data:
